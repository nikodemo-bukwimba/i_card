name: icard
description: Digital Business Card — ISSUBI LIFE SYSTEM™
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Storage
  shared_preferences: ^2.3.1

  # Media
  image_picker: ^1.1.2

  # QR code generation
  qr_flutter: ^4.1.0

  # URL launching
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
